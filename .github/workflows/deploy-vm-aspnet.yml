name: Deploy ASP.NET Core to VM

on:
  workflow_dispatch:
    inputs:
      app_dll:
        description: "Published ASP.NET Core DLL name (example: MyApp.dll)"
        required: true
        default: "MyApp.dll"
      webapp_ref:
        description: "Branch, tag, or commit of the web app repo"
        required: true
        default: "main"

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, vpn]

    env:
      VM_HOST: ${{ vars.VM_HOST || '10.0.1.4' }}
      APP_HEALTH_URL: ${{ vars.APP_HEALTH_URL || 'https://20.111.42.85' }}
      APP_DIR: /opt/securecloud/app
      WEBAPP_REPO: ${{ vars.WEBAPP_REPO }}
      APP_DLL: ${{ github.event.inputs.app_dll || 'MyApp.dll' }}
      DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}

    steps:
      - name: Ensure web app repo is configured
        run: |
          if [ -z "${WEBAPP_REPO}" ]; then
            echo "Missing repository variable WEBAPP_REPO (format owner/repo)"
            exit 1
          fi

      - name: Ensure DB connection string is configured
        run: |
          if [ -z "${DB_CONNECTION_STRING}" ]; then
            echo "Missing repository secret DB_CONNECTION_STRING"
            exit 1
          fi

      - name: Checkout web app repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WEBAPP_REPO }}
          ref: ${{ github.event.inputs.webapp_ref }}
          token: ${{ secrets.WEBAPP_REPO_PAT != '' && secrets.WEBAPP_REPO_PAT || github.token }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            6.0.x
        env:
          DOTNET_INSTALL_DIR: ${{ github.workspace }}/.dotnet

      - name: Publish ASP.NET Core app
        run: |
          dotnet restore
          dotnet publish -c Release -r linux-x64 --self-contained true /p:UseAppHost=true -o ./publish

      - name: Apply EF Core migrations
        run: |
          set -eux
          export PATH="$PATH:$HOME/.dotnet/tools"
          if ! command -v dotnet-ef >/dev/null 2>&1; then
            dotnet tool install --global dotnet-ef --version 6.*
          fi

          PROJECT_FILE=$(find . -maxdepth 4 -name '*.csproj' | head -n 1)
          if [ -z "$PROJECT_FILE" ]; then
            echo "No .csproj file found for migrations"
            exit 1
          fi

          dotnet ef database update --project "$PROJECT_FILE" --startup-project "$PROJECT_FILE" --connection "$DB_CONNECTION_STRING"

      - name: Ensure VM host is configured
        run: |
          if [ -z "${VM_HOST}" ]; then
            echo "Missing repository variable VM_HOST"
            exit 1
          fi

      - name: Prepare SSH key
        run: |
          set -eux
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.VM_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Upload published files to VM
        run: |
          set -eux
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.VM_USERNAME }}@${VM_HOST} "mkdir -p /tmp/securecloud-deploy"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -r ./publish/* ${{ secrets.VM_USERNAME }}@${VM_HOST}:/tmp/securecloud-deploy/

      - name: Activate deployment on VM
        run: |
          set -eux
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.VM_USERNAME }}@${VM_HOST} "APP_DIR='${APP_DIR}' APP_DLL='${APP_DLL}' VM_USER='${{ secrets.VM_USERNAME }}' DB_CONNECTION_STRING='${DB_CONNECTION_STRING}' bash -s" <<'EOF'
          set -euxo pipefail
          sudo mkdir -p "$APP_DIR"
          sudo cp -r /tmp/securecloud-deploy/* "$APP_DIR"/
          sudo chown -R "$VM_USER":"$VM_USER" "$APP_DIR"

          SERVICE_FILE="/etc/systemd/system/securecloud-web.service"
          APP_EXEC="$APP_DIR/${APP_DLL%.dll}"
          if [ -x "$APP_EXEC" ]; then
            EXEC_START="$APP_EXEC"
          else
            EXEC_START="/usr/bin/dotnet $APP_DIR/$APP_DLL"
          fi

          sudo tee "$SERVICE_FILE" > /dev/null <<SERVICE
          [Unit]
          Description=SecureCloud ASP.NET Core App
          After=network.target

          [Service]
          WorkingDirectory=$APP_DIR
          ExecStart=$EXEC_START
          Restart=always
          RestartSec=10
          KillSignal=SIGINT
          SyslogIdentifier=securecloud-web
          User=$VM_USER
          Environment=ASPNETCORE_URLS=http://127.0.0.1:5000
          Environment=ASPNETCORE_ENVIRONMENT=Production
          Environment="ConnectionStrings__DefaultConnection=$DB_CONNECTION_STRING"

          [Install]
          WantedBy=multi-user.target
          SERVICE

          RUNTIMECONFIG_FILE="$APP_DIR/${APP_DLL%.dll}.runtimeconfig.json"
          if [ -f "$RUNTIMECONFIG_FILE" ]; then
            REQUIRED_RUNTIME_VERSION=$(sed -n 's/.*"version":[[:space:]]*"\([0-9]\+\.[0-9]\+\)\..*/\1/p' "$RUNTIMECONFIG_FILE" | head -n1)
            if [ -n "$REQUIRED_RUNTIME_VERSION" ] && ! dotnet --list-runtimes | grep -q "Microsoft.NETCore.App $REQUIRED_RUNTIME_VERSION"; then
              sudo apt-get update
              sudo apt-get install -y "dotnet-runtime-$REQUIRED_RUNTIME_VERSION" "aspnetcore-runtime-$REQUIRED_RUNTIME_VERSION"
            fi
          fi

          sudo systemctl daemon-reload
          sudo systemctl enable securecloud-web
          sudo systemctl restart securecloud-web
          sudo systemctl --no-pager --full status securecloud-web || { sudo journalctl -u securecloud-web -n 80 --no-pager; exit 1; }
          EOF

      - name: Health check through Application Gateway
        run: |
          set -eux
          curl -kfsS --retry 8 --retry-delay 5 --retry-all-errors "${APP_HEALTH_URL}" > /dev/null
          echo "Health check passed: ${APP_HEALTH_URL}"
